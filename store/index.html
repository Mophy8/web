<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶柑仔店 - 手機平板雙適應版</title>
    <style>
        /* 基礎防錯與底色設定 */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #fcf8f2; 
            margin: 0; 
            padding: 15px; 
            user-select: none; 
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }
        
        /* 頂部資訊看板 */
        .header-box { 
            text-align: center; 
            background-color: #ffe8cc; 
            border: 4px solid #d9480f; 
            border-radius: 20px; 
            padding: 15px; 
            margin: 0 auto 20px auto; 
            max-width: 1000px;
            position: relative;
            box-shadow: 0 5px 0 rgba(0,0,0,0.05);
        }

        /* 分數看板 */
        .score-board {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #d9480f;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 3px 0 #2b2b2b;
        }
        
        .title-text { font-size: 22px; font-weight: bold; color: #d9480f; margin: 0 0 5px 0; }
        .instruction-text { font-size: 32px; font-weight: bold; color: #2b2b2b; margin: 0; }
        
        /* 貨架網格：核心響應式排版（預設手機為一列，大螢幕變三列） */
        .shelf-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        /* 巨型按鈕（手機版高度有稍微收斂，防止爆頁） */
        .item-btn { 
            background-color: #ffffff; 
            border: 5px solid #2b2b2b; 
            border-radius: 24px; 
            padding: 15px 20px; 
            cursor: pointer; 
            box-shadow: 0 8px 0 #2b2b2b; 
            transition: transform 0.05s, box-shadow 0.05s; 
            display: flex; 
            flex-direction: row; /* 手機版圖在左、字在右，節省高度 */
            align-items: center;
            justify-content: flex-start;
            width: 100%;
        }

        .item-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 4px 0 #2b2b2b; 
        }

        /* 商品圖示區 */
        .item-image-placeholder { 
            width: 80px; 
            height: 80px; 
            background-color: #f1f3f5; 
            border: 2px dashed #ced4da; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 50px; 
            margin-right: 25px; /* 圖右方留空隙給文字 */
            flex-shrink: 0;
        }

        .item-label { font-size: 32px; font-weight: bold; color: #2b2b2b; }
        
        /* 滿版覆蓋提示層 */
        .result-overlay { 
            display: flex; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .result-box { 
            background-color: white; 
            border: 6px solid #d9480f; 
            border-radius: 28px; 
            padding: 35px 20px; 
            text-align: center; 
            width: 100%; 
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .result-title { font-size: 42px; font-weight: bold; margin: 0 0 25px 0; line-height: 1.3; }
        .next-btn { 
            font-size: 28px; 
            font-weight: bold; 
            color: white; 
            padding: 15px 40px; 
            border-radius: 18px; 
            cursor: pointer; 
            border: none; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.2); 
            transition: transform 0.05s;
            width: 100%; /* 按鈕滿版更好按 */
        }
        .next-btn:active { transform: translateY(3px); }

        /* ────────────────────────────────────────────────────────
           平板與電腦大螢幕專用樣式 (螢幕寬度大於 768px 時自動切換)
           ──────────────────────────────────────────────────────── */
        @media (min-width: 768px) {
            body { padding: 30px; }
            .header-box { padding: 30px; margin-bottom: 40px; border-width: 6px; }
            .score-board { font-size: 28px; top: 25px; right: 25px; padding: 10px 25px; }
            .title-text { font-size: 36px; margin-bottom: 10px; }
            .instruction-text { font-size: 48px; }
            
            /* 變回 3 欄並排的豪華大貨架 */
            .shelf-grid { grid-template-columns: repeat(3, 1fr); gap: 30px; }
            
            /* 按鈕恢復上下排列的巨型方塊外觀 */
            .item-btn { 
                flex-direction: column; 
                justify-content: center;
                padding: 40px 20px; 
                box-shadow: 0 14px 0 #2b2b2b;
                border-width: 6px;
            }
            .item-btn:active { transform: translateY(8px); box-shadow: 0 6px 0 #2b2b2b; }
            .item-image-placeholder { width: 180px; height: 180px; font-size: 100px; margin-right: 0; margin-bottom: 20px; }
            .item-label { font-size: 40px; }
            
            .result-box { padding: 50px; border-width: 8px; }
            .result-title { font-size: 55px; }
            .next-btn { font-size: 36px; width: auto; }
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="start-overlay" class="result-overlay">
        <div class="result-box">
            <h2 class="result-title" style="color: #d9480f;">歡迎來到<br>記憶柑仔店</h2>
            <p style="font-size: 24px; font-weight: bold; margin-bottom: 30px; color:#555;">請點擊下方按鈕開始遊玩</p>
            <button class="next-btn" style="background-color: #d9480f;" onclick="startGame()">點我開始</button>
        </div>
    </div>

    <!-- 主要資訊區 -->
    <div class="header-box">
        <div id="score-display" class="score-board">分數：0</div>
        <p id="level-title" class="title-text"></p>
        <p id="target-instruction" class="instruction-text"></p>
    </div>

    <!-- 貨架區 -->
    <div id="game-shelf" class="shelf-grid"></div>

    <!-- 結果彈窗 -->
    <div id="result-overlay" class="result-overlay" style="display: none;">
        <div id="result-box" class="result-box">
            <h2 id="result-message" class="result-title"></h2>
            <button id="action-btn" class="next-btn" onclick="closeResult()"></button>
        </div>
    </div>

    <script>
        // 10 種懷舊主題題庫
        const bigQuestionPool = [
            { target: "彈珠汽水", items: [{name:"彈珠汽水", icon:"🥤", isCorrect:true}, {name:"柑仔糖", icon:"🍬", isCorrect:false}, {name:"冰棒", icon:"🍧", isCorrect:false}] },
            { target: "科學麵", items: [{name:"黑松沙士", icon:"🟫", isCorrect:false}, {name:"科學麵", icon:"🍜", isCorrect:true}, {name:"紅豆餅", icon:"🥞", isCorrect:false}] },
            { target: "烤香腸", items: [{name:"巧克力", icon:"🍫", isCorrect:false}, {name:"烤香腸", icon:"🌭", isCorrect:true}, {name:"豆花", icon:"🥣", isCorrect:false}] },
            { target: "糖葫蘆", items: [{name:"糖葫蘆", icon:"🍡", isCorrect:true}, {name:"西瓜", icon:"🍉", isCorrect:false}, {name:"雞蛋糕", icon:"🥮", isCorrect:false}] },
            { target: "陀螺", items: [{name:"風箏", icon:"🪁", isCorrect:false}, {name:"陀螺", icon:"🪀", isCorrect:true}, {name:"尪仔標", icon:"🃏", isCorrect:false}] },
            { target: "黑松沙士", items: [{name:"冬瓜茶", icon:"☕", isCorrect:false}, {name:"米漿", icon:"🥛", isCorrect:false}, {name:"黑松沙士", icon:"🟫", isCorrect:true}] },
            { target: "尪仔標", items: [{name:"尪仔標", icon:"🃏", isCorrect:true}, {name:"沙包", icon:"🎒", isCorrect:false}, {name:"竹蜻蜓", icon:"🚁", isCorrect:false}] },
            { target: "水槍", items: [{name:"陀螺", icon:"🪀", isCorrect:false}, {name:"風箏", icon:"🪁", isCorrect:false}, {name:"水槍", icon:"🔫", isCorrect:true}] },
            { target: "滷肉飯", items: [{name:"滷肉飯", icon:"🍚", isCorrect:true}, {name:"牛肉麵", icon:"🍜", isCorrect:false}, {name:"小籠包", icon:"🥟", isCorrect:false}] },
            { target: "肉圓", items: [{name:"臭豆腐", icon:"🟨", isCorrect:false}, {name:"肉圓", icon:"🔮", isCorrect:true}, {name:"大腸包小腸", icon:"🌭", isCorrect:false}] }
        ];

        let gameData = []; 
        let currentLevelIndex = 0;
        let totalScore = 0;
        const totalLevelsThisRound = 5; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(isSuccess) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (isSuccess) {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(170, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function setupNewRound() {
            const shuffledPool = [...bigQuestionPool].sort(() => Math.random() - 0.5);
            gameData = shuffledPool.slice(0, totalLevelsThisRound);
            gameData.forEach(level => {
                level.items.sort(() => Math.random() - 0.5);
            });
        }

        function startGame() {
            audioCtx.resume();
            document.getElementById('start-overlay').style.display = 'none';
            setupNewRound();
            renderLevel();
        }

        // 固定使用標準台灣國語（微慢清晰速度）
        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function renderLevel() {
            const data = gameData[currentLevelIndex];
            document.getElementById('level-title').innerText = `第 ${currentLevelIndex + 1} / ${gameData.length} 關`;
            document.getElementById('target-instruction').innerText = `請幫我找：【${data.target}】`;
            
            const shelf = document.getElementById('game-shelf');
            shelf.innerHTML = '';
            
            data.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'item-btn';
                btn.onclick = () => handleChoice(item.isCorrect);
                btn.innerHTML = `<div class="item-image-placeholder">${item.icon}</div><span class="item-label">${item.name}</span>`;
                shelf.appendChild(btn);
            });

            // 進入關卡自動播放題目語音
            setTimeout(() => {
                speakText(`請幫我找 ${data.target}`);
            }, 300);
        }

        function handleChoice(isCorrect) {
            const overlay = document.getElementById('result-overlay');
            const box = document.getElementById('result-box');
            const msg = document.getElementById('result-message');
            const btn = document.getElementById('action-btn');
            
            overlay.style.display = 'flex';
            
            if (isCorrect) {
                playBeep(true);
                totalScore += 20; 
                document.getElementById('score-display').innerText = `分數：${totalScore}`;

                msg.style.color = "#2b8a3e";
                box.style.borderColor = "#40c057";

                if (currentLevelIndex < gameData.length - 1) {
                    msg.innerText = "答對了！您真棒！";
                    speakText("答對了！您真棒！");
                    btn.innerText = "下一關";
                    btn.style.backgroundColor = "#40c057";
                    btn.onclick = () => {
                        currentLevelIndex++;
                        closeResult();
                        renderLevel();
                    };
                } else {
                    msg.innerHTML = `太厲害了！<br><span style="font-size:28px;color:#d9480f;">您榮獲金牌店長！</span>`;
                    speakText("太厲害了！您榮獲金牌店長！");
                    btn.innerText = "再玩一次";
                    btn.style.backgroundColor = "#2b8b57";
                    btn.onclick = () => {
                        currentLevelIndex = 0;
                        totalScore = 0;
                        document.getElementById('score-display').innerText = `分數：0`;
                        closeResult();
                        setupNewRound();
                        renderLevel();
                    };
                }
            } else {
                playBeep(false);
                msg.innerText = "再試一次喔！";
                msg.style.color = "#e03131";
                box.style.borderColor = "#fa5252";
                
                speakText("再試一次喔");

                btn.innerText = "再找找看";
                btn.style.backgroundColor = "#ff922b";
                btn.onclick = () => closeResult();
            }
        }

        function closeResult() { 
            document.getElementById('result-overlay').style.display = 'none'; 
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
