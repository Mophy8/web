<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>記憶柑仔店 - 真人語音修正版</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #fcf8f2; 
            margin: 0; 
            padding: 20px; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        
        /* 頂部資訊區 */
        .header-box { 
            text-align: center; 
            background-color: #ffe8cc; 
            border: 5px solid #d9480f; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 35px; 
            position: relative;
        }
        .score-board {
            position: absolute;
            top: 15px;
            right: 20px;
            background-color: #d9480f;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 0 #2b2b2b;
        }
        
        /* 語音切換按鈕區 */
        .voice-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .voice-btn {
            font-size: 24px;
            font-weight: bold;
            padding: 10px 25px;
            border: 3px solid #2b2b2b;
            border-radius: 12px;
            cursor: pointer;
            background-color: #fff;
        }
        .voice-btn.active {
            background-color: #ff922b;
            color: white;
            border-color: #d9480f;
        }

        .title-text { font-size: 38px; font-weight: bold; color: #d9480f; margin: 0 0 10px 0; }
        .instruction-text { font-size: 48px; font-weight: bold; color: #2b2b2b; margin: 0; }
        
        /* 貨架區 */
        .shelf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; }
        .item-btn { background-color: #ffffff; border: 6px solid #2b2b2b; border-radius: 32px; padding: 30px 20px; cursor: pointer; box-shadow: 0 12px 0 #2b2b2b; transition: transform 0.1s; display: flex; flex-direction: column; align-items: center; }
        .item-btn:active { transform: translateY(6px); }
        .item-image-placeholder { width: 220px; height: 220px; background-color: #f1f3f5; border: 3px dashed #ced4da; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 110px; margin-bottom: 20px; }
        .item-label { font-size: 40px; font-weight: bold; color: #2b2b2b; }
        
        /* 滿版覆蓋層（引導與結果通用） */
        .result-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .result-box { background-color: white; border: 8px solid #d9480f; border-radius: 32px; padding: 50px; text-align: center; width: 80%; max-width: 550px;}
        .result-title { font-size: 54px; font-weight: bold; margin: 0 0 30px 0; }
        .next-btn { font-size: 38px; font-weight: bold; color: white; padding: 20px 50px; border-radius: 20px; cursor: pointer; border: none; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <!-- 遊戲開始前的啟動畫面（解鎖瀏覽器音效與語音核心） -->
    <div id="start-overlay" class="result-overlay">
        <div class="result-box" style="border-color: #d9480f;">
            <h2 class="result-title" style="color: #d9480f;">歡迎來到記憶柑仔店</h2>
            <p style="font-size: 30px; font-weight: bold; margin-bottom: 30px;">請點擊下方大按鈕開始</p>
            <button class="next-btn" style="background-color: #d9480f;" onclick="startGame()">點我開始遊戲</button>
        </div>
    </div>

    <!-- 語音語言切換 -->
    <div class="voice-controls">
        <button id="btn-zh" class="voice-btn active" onclick="setLanguage('zh')">🔊 國語發音</button>
        <button id="btn-tw" class="voice-btn" onclick="setLanguage('tw')">🔊 台語發音</button>
    </div>

    <div class="header-box">
        <div id="score-display" class="score-board">分數：0 分</div>
        <p id="level-title" class="title-text"></p>
        <p id="target-instruction" class="instruction-text"></p>
    </div>

    <div id="game-shelf" class="shelf-grid"></div>

    <!-- 勝負彈窗 -->
    <div id="result-overlay" class="result-overlay" style="display: none;">
        <div id="result-box" class="result-box">
            <h2 id="result-message" class="result-title"></h2>
            <button id="action-btn" class="next-btn" onclick="closeResult()"></button>
        </div>
    </div>

    <script>
        // 關卡與多語言語音文字
        const gameData = [
            { 
                target: "彈珠汽水", 
                voiceText: { zh: "請幫我找彈珠汽水", tw: "請看顧我找 彈珠汽水" },
                items: [{name:"彈珠汽水", icon:"🥤", isCorrect:true}, {name:"柑仔糖", icon:"🍬", isCorrect:false}] 
            },
            { 
                target: "科學麵", 
                voiceText: { zh: "請幫我找科學麵", tw: "請看顧我找 科學麵" },
                items: [{name:"科學麵", icon:"🍜", isCorrect:true}, {name:"黑松沙士", icon:"🧴", isCorrect:false}] 
            },
            { 
                target: "泡泡糖", 
                voiceText: { zh: "請幫我找泡泡糖", tw: "請看顧我找 泡泡糖" },
                items: [{name:"巧克力", icon:"🍫", isCorrect:false}, {name:"泡泡糖", icon:"🎈", isCorrect:true}] 
            }
        ];

        // 回饋音效設定 (採用瀏覽器高相容合成音頻，免加載外部檔案，100%有聲音)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(isSuccess) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (isSuccess) {
                // 答對：清脆的叮咚雙音
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else {
                // 答錯：沉悶的嘟聲
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        let currentLevelIndex = 0;
        let totalScore = 0;
        let currentLang = 'zh'; // 預設國語

        // 解鎖音效核心
        function startGame() {
            audioCtx.resume();
            document.getElementById('start-overlay').style.display = 'none';
            renderLevel();
        }

        // 切換語言
        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-zh').className = `voice-btn ${lang === 'zh' ? 'active' : ''}`;
            document.getElementById('btn-tw').className = `voice-btn ${lang === 'tw' ? 'active' : ''}`;
            speakText(gameData[currentLevelIndex].voiceText[currentLang]);
        }

        // 真人語音合成發聲
        function speakText(text) {
            window.speechSynthesis.cancel(); // 停止之前的聲音
            const utterance = new SpeechSynthesisUtterance(text);
            
            if (currentLang === 'zh') {
                utterance.lang = 'zh-TW'; // 台灣國語
            } else if (currentLang === 'tw') {
                // 大部分系統（iOS/Android）使用 Minnan 或是地區語系代表台語，這裡進行相容設定
                utterance.lang = 'zh-HK'; 
                // 註：若長輩的手機/平板系統有內建台語包，指定 zh-TW 並帶有台語常用詞即可自動轉換。
            }
            utterance.rate = 0.8; // 放慢講話速度，方便長輩聆聽
            window.speechSynthesis.speak(utterance);
        }

        function renderLevel() {
            const data = gameData[currentLevelIndex];
            document.getElementById('level-title').innerText = `第 ${currentLevelIndex + 1} 關：採買時間`;
            document.getElementById('target-instruction').innerText = `請幫我找：【${data.target}】`;
            
            const shelf = document.getElementById('game-shelf');
            shelf.innerHTML = '';
            
            data.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'item-btn';
                btn.onclick = () => handleChoice(item.isCorrect);
                btn.innerHTML = `<div class="item-image-placeholder">${item.icon}</div><span class="item-label">${item.name}</span>`;
                shelf.appendChild(btn);
            });

            // 進入關卡自動播放語音
            setTimeout(() => {
                speakText(data.voiceText[currentLang]);
            }, 300);
        }

        function handleChoice(isCorrect) {
            const overlay = document.getElementById('result-overlay');
            const box = document.getElementById('result-box');
            const msg = document.getElementById('result-message');
            const btn = document.getElementById('action-btn');
            
            overlay.style.display = 'flex';
            
            if (isCorrect) {
                playBeep(true); // 播放修正後的蜂鳴音效
                totalScore += 10;
                document.getElementById('score-display').innerText = `分數：${totalScore} 分`;

                msg.innerText = "答對了！您真棒！";
                msg.style.color = "#2b8a3e";
                box.style.borderColor = "#40c057";
                
                // 答對語音讚美
                const praiseText = currentLang === 'zh' ? "答對了！您真棒！" : "著啊！哩真讚！";
                speakText(praiseText);

                if (currentLevelIndex < gameData.length - 1) {
                    btn.innerText = "下一關";
                    btn.style.backgroundColor = "#40c057";
                    btn.onclick = () => {
                        currentLevelIndex++;
                        closeResult();
                        renderLevel();
                    };
                } else {
                    btn.innerText = "再玩一次";
                    btn.style.backgroundColor = "#2b8b57";
                    btn.onclick = () => {
                        currentLevelIndex = 0;
                        totalScore = 0;
                        document.getElementById('score-display').innerText = `分數：0 分`;
                        closeResult();
                        renderLevel();
                    };
                }
            } else {
                playBeep(false); // 播放失敗蜂鳴音效
                msg.innerText = "再試一次喔！";
                msg.style.color = "#e03131";
                box.style.borderColor = "#fa5252";
                
                // 答錯語音提示
                const retryText = currentLang === 'zh' ? "再試一次喔" : "閣試一擺喔";
                speakText(retryText);

                btn.innerText = "再找找看";
                btn.style.backgroundColor = "#ff922b";
                btn.onclick = () => closeResult();
            }
        }

        function closeResult() { 
            document.getElementById('result-overlay').style.display = 'none'; 
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
