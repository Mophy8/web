<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶柑仔店 - 勝負邏輯與大圖測試</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #fcf8f2;
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 頂部大字體提示區 */
        .header-box {
            text-align: center;
            background-color: #ffe8cc;
            border: 5px solid #d9480f;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 35px;
        }

        .title-text {
            font-size: 38px;
            font-weight: bold;
            color: #d9480f;
            margin: 0 0 10px 0;
        }

        .instruction-text {
            font-size: 48px;
            font-weight: bold;
            color: #2b2b2b;
            margin: 0;
        }

        /* 貨架網格：加大間距與寬度 */
        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 巨型按鈕設計 */
        .item-btn {
            background-color: #ffffff;
            border: 6px solid #2b2b2b;
            border-radius: 32px;
            padding: 30px 20px;
            cursor: pointer;
            box-shadow: 0 12px 0 #2b2b2b;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #2b2b2b;
        }

        /* 修正圖太小：大幅度放大圖片區塊 */
        .item-image-placeholder {
            width: 220px;
            height: 220px;
            background-color: #f1f3f5;
            border: 3px dashed #ced4da;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px; /* 超大 Emoji 圖示，未來可直接換成 <img> */
            margin-bottom: 20px;
        }

        .item-label {
            font-size: 40px;
            font-weight: bold;
            color: #2b2b2b;
        }

        /* 滿版勝負結果提示區（預設隱藏） */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .result-box {
            background-color: white;
            border: 8px solid #40c057;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            width: 80%;
        }

        .result-title {
            font-size: 64px;
            font-weight: bold;
            margin: 0 0 30px 0;
        }

        /* 答對與答錯的特別顏色 */
        .text-success { color: #2b8a3e; }
        .text-wrong { color: #e03131; }

        /* 下一關/再試一次 的巨型按鈕 */
        .next-btn {
            font-size: 38px;
            font-weight: bold;
            color: white;
            padding: 20px 50px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn-success { background-color: #40c057; }
        .btn-wrong { background-color: #ff922b; }
    </style>
</head>
<body>

    <!-- 提示區 -->
    <div class="header-box">
        <p id="level-title" class="title-text">第一關：客人的訂單</p>
        <p id="target-instruction" class="instruction-text">請點選【彈珠汽水】</p>
    </div>

    <!-- 貨架區 -->
    <div id="game-shelf" class="shelf-grid">
        <!-- 這裡由 JavaScript 動態生成按鈕，方便控管勝負 -->
    </div>

    <!-- 滿版勝負結果提示區 -->
    <div id="result-overlay" class="result-overlay">
        <div id="result-box" class="result-box">
            <h2 id="result-message" class="result-title">答對了！</h2>
            <button id="action-btn" class="next-btn" onclick="closeResult()">下一關</button>
        </div>
    </div>

    <script>
        // 模擬關卡資料
        const gameData = [
            {
                level: "第一關：客人的訂單",
                target: "彈珠汽水",
                items: [
                    { name: "彈珠汽水", icon: "🧃", isCorrect: true },
                    { name: "柑仔糖", icon: "🍬", isCorrect: false }
                ]
            },
            {
                level: "第二關：客人的訂單",
                target: "科學麵",
                items: [
                    { name: "黑松沙士", icon: "🥤", isCorrect: false },
                    { name: "科學麵", icon: "🍜", isCorrect: true }
                ]
            }
        ];

        let currentLevelIndex = 0;

        // 初始化關卡
        function renderLevel() {
            const data = gameData[currentLevelIndex];
            
            // 更新文字
            document.getElementById('level-title').innerText = data.level;
            document.getElementById('target-instruction').innerText = `請點選【${data.target}】`;
            
            // 生成貨架物品
            const shelf = document.getElementById('game-shelf');
            shelf.innerHTML = ''; // 清空舊物品
            
            data.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'item-btn';
                // 點擊時觸發勝負邏輯
                btn.onclick = () => handleChoice(item.isCorrect);
                
                btn.innerHTML = `
                    <div class="item-image-placeholder">${item.icon}</div>
                    <span class="item-label">${item.name}</span>
                `;
                shelf.appendChild(btn);
            });
        }

        // 判定勝負邏輯
        function handleChoice(isCorrect) {
            const overlay = document.getElementById('result-overlay');
            const box = document.getElementById('result-box');
            const msg = document.getElementById('result-message');
            const btn = document.getElementById('action-btn');

            overlay.style.display = 'flex';

            if (isCorrect) {
                msg.innerText = "答對了！您真棒！";
                msg.className = "result-title text-success";
                box.style.borderColor = "#40c057";
                
                // 檢查是不是最後一關
                if (currentLevelIndex < gameData.length - 1) {
                    btn.innerText = "下一關";
                    btn.className = "next-btn btn-success";
                    btn.onclick = () => {
                        currentLevelIndex++;
                        closeResult();
                        renderLevel();
                    };
                } else {
                    btn.innerText = "再玩一次";
                    btn.className = "next-btn btn-success";
                    btn.onclick = () => {
                        currentLevelIndex = 0;
                        closeResult();
                        renderLevel();
                    };
                }
            } else {
                msg.innerText = "再試一次喔！";
                msg.className = "result-title text-wrong";
                box.style.borderColor = "#fa5252";
                btn.innerText = "繼續嘗試";
                btn.className = "next-btn btn-wrong";
                btn.onclick = () => closeResult();
            }
        }

        function closeResult() {
            document.getElementById('result-overlay').style.display = 'none';
        }

        // 首次載入
        renderLevel();
    </script>
</body>
</html>
