<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澎湖阿公聊天室</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f0f8ff; font-size: 24px; }
    h2 { color: #333; text-align: center; font-size: 32px; margin-bottom: 10px; }
    .user-tag { text-align: center; color: #0056b3; font-weight: bold; margin-bottom: 20px; font-size: 26px; }
    .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .phrase-btn { background-color: #4CAF50; color: white; border: none; padding: 20px; font-size: 26px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .phrase-btn:active { background-color: #3e8e41; }
    
    /* 貼圖區樣式 */
    .emoji-container { background: #e6f2ff; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    .emoji-title { font-size: 20px; color: #555; margin-bottom: 8px; font-weight: bold; }
    .emoji-btn { font-size: 35px; background: none; border: none; cursor: pointer; margin: 0 10px; transition: transform 0.1s; }
    .emoji-btn:active { transform: scale(1.3); }

    #chat-box { border: 2px solid #ccc; background: white; padding: 15px; height: 350px; overflow-y: auto; border-radius: 8px; }
    .msg-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 22px; line-height: 1.5; }
    .msg-time { color: #999; font-size: 16px; margin-right: 5px; }
    .msg-elder { color: #0056b3; font-weight: bold; }
    .msg-young { color: #d9534f; font-weight: bold; }
  </style>
</head>
<body>

  <h2>聊天室 💬</h2>
  <div class="user-tag">👴 當前使用者：澎湖阿公</div>
  
  <div class="btn-container" id="phrase-buttons">載入常用語中...</div>

  <div class="emoji-container">
    <div class="emoji-title">點貼圖直接送出：</div>
    <button class="emoji-btn" onclick="sendPhrase('👍')">👍</button>
    <button class="emoji-btn" onclick="sendPhrase('❤️')">❤️</button>
    <button class="emoji-btn" onclick="sendPhrase('😂')">😂</button>
    <button class="emoji-btn" onclick="sendPhrase('🙏')">🙏</button>
    <button class="emoji-btn" onclick="sendPhrase('🎉')">🎉</button>
    <button class="emoji-btn" onclick="sendPhrase('🌸')">🌸</button>
  </div>

  <div id="chat-box">載入對話中...</div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzfE5zSvOVB0ppoS65Uq7k9AJMC6KmRSmnAO0_tP-3TScCeWgofvKWhPDUj85-Tpu8/exec";
    const myName = "澎湖阿公";
    let userIP = "未知 IP";

    window.onload = async function() {
      // 抓取 IP
      try {
        let res = await fetch('https://api.ipify.org?format=json');
        let data = await res.json();
        userIP = data.ip;
      } catch (e) { console.log("無法獲取 IP"); }
      
      loadPhrases(); // 載入試算表的動態清單
      loadMessages();
      setInterval(loadMessages, 4000);
    };

    // 從 GAS 獲取試算表中的 phrases 清單並生成按鈕
    function loadPhrases() {
      fetch(`${GAS_URL}?action=getPhrases`)
        .then(res => res.json())
        .then(phrases => {
          const container = document.getElementById('phrase-buttons');
          if (!phrases || phrases.length === 0) {
            container.innerHTML = '未設定常用語';
            return;
          }
          container.innerHTML = '';
          phrases.forEach(text => {
            container.innerHTML += `<button class="phrase-btn" onclick="sendPhrase('${text}')">${text}</button>`;
          });
        }).catch(err => {
          document.getElementById('phrase-buttons').innerHTML = '無法載入清單';
        });
    }

    function sendPhrase(text) {
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ role: "長輩", name: myName, message: text, ip: userIP })
      }).then(() => loadMessages());
    }

    function loadMessages() {
      fetch(GAS_URL)
        .then(res => res.json())
        .then(messages => {
          var chatBox = document.getElementById('chat-box');
          if (!messages || messages.length === 0) {
            chatBox.innerHTML = '目前沒有對話紀錄。';
            return;
          }
          chatBox.innerHTML = '';
          messages.forEach(function(msg) {
            var cls = msg.role === '長輩' ? 'msg-elder' : 'msg-young';
            chatBox.innerHTML += `<div class="msg-item"><span class="msg-time">${msg.time}</span> <span class="${cls}">[${msg.name}]:</span> ${msg.text}</div>`;
          });
        });
    }
  </script>
</body>
</html>
