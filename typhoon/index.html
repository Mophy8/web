<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>颱風大作戰 V2</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #111; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100vh; max-height: 800px; background: linear-gradient(to bottom, #1a2a3a, #0b1116); overflow: hidden; border: 2px solid #333; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; color: white; font-size: 16px; font-weight: bold; z-index: 20; text-shadow: 1px 1px 3px black; }
        #player { position: absolute; bottom: 40px; left: 50%; width: 60px; height: 60px; transform: translateX(-50%); font-size: 45px; text-align: center; line-height: 60px; z-index: 5; transition: left 0.05s ease-out; }
        .game-object { position: absolute; width: 40px; height: 40px; font-size: 32px; text-align: center; line-height: 40px; z-index: 4; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.93); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; padding: 25px; text-align: center; overflow-y: auto; }
        button { background: #00ec9a; color: #0a0f19; border: none; padding: 12px 35px; font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,236,154,0.3); }
        button:active { transform: scale(0.95); }
        input[type="text"] { background: #223142; border: 1px solid #44566c; padding: 10px; color: white; border-radius: 8px; width: 80%; text-align: center; font-size: 16px; margin: 10px 0; }
        .leaderboard-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; width: 90%; padding: 12px; margin: 15px 0; font-size: 14px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leaderboard-item:last-child { border: none; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .view-counter { font-size: 12px; color: #8899a6; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="ui-score">📦 物資: 0</div>
            <div id="ui-timer">⏱️ 倒數: 60s</div>
            <div id="ui-hp">❤️ ❤️ ❤️</div>
        </div>

        <div id="player">🧑‍🌾</div>

        <div id="start-screen" class="screen">
            <h2>🌀 颱風大作戰 V2</h2>
            <p style="font-size: 14px; color: #b0c4de;">物品下落初速已調慢，風力將隨時間逐漸增強！</p>
            
            <div class="leaderboard-box">
                <b>🏆 護國神山前三名排行</b>
                <div id="start-leaderboard" style="margin-top: 8px;">載入中...</div>
            </div>
            
            <button onclick="startGame()">開始防災</button>
            <div id="site-views" class="view-counter">瀏覽量：--</div>
        </div>

        <div id="gameover-screen" class="screen hidden">
            <h2 id="end-title">遊戲結束</h2>
            <p id="end-score">最終搶救物資：0 個</p>
            
            <div id="upload-section">
                <p style="font-size: 14px; color: #ffbc00;">恭喜挺過風雨！輸入暱稱留名英雄榜：</p>
                <input type="text" id="player-name" placeholder="輸入您的暱稱(最多8字)" maxlength="8">
                <button id="submit-btn" onclick="submitScore()">上傳紀錄</button>
            </div>

            <div class="leaderboard-box">
                <b>最新即時前三名</b>
                <div id="end-leaderboard" style="margin-top: 8px;">上傳後更新...</div>
            </div>
            
            <button onclick="resetGame()" style="background: #ff4757; color: white;">再玩一次</button>
        </div>
    </div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const uiScore = document.getElementById('ui-score');
    const uiTimer = document.getElementById('ui-timer');
    const uiHp = document.getElementById('ui-hp');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const endTitle = document.getElementById('end-title');
    const endScore = document.getElementById('end-score');

    // 請替換成你部署完畢的 Google Apps Script 網頁應用程式網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzRGkkkMbNSTeZCdfVzqK8V_obj47jEtcn_EJpab2-D0cqhf3Eai7i93Kh8cgJPnHU/exec";

    let gameActive = false, score = 0, hp = 3, timeLeft = 60, playerX = 50;
    let gameLoopId, timerId, spawnId, playerIP = "未知IP";
    let gameObjects = [];
    const items = ['🍜', '💧', '🥫', '🍞'];
    const hazards = ['🪴', '🪧', '🌳', '🧱'];

    // Web Audio API 免外部檔案音效生成器
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'score') { // 得分音效：清脆的高音逼逼聲
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'hit') { // 撞擊音效：低沈的爆炸感
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }
    }

    // 初始化讀取（瀏覽量與排行榜）並獲取真實 IP
    window.onload = async () => {
        // 異步取得玩家外部 IP
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            playerIP = ipData.ip;
        } catch(e) { console.log("無法獲取真實IP"); }

        // 向 GAS 獲取初始化數據
        if(GAS_URL !== "YOUR_GAS_WEB_APP_URL") {
            fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('site-views').innerText = `瀏覽量：${data.views} 次`;
                renderLeaderboard('start-leaderboard', data.topThree);
            }).catch(err => {
                document.getElementById('start-leaderboard').innerText = "暫時無法載入排行";
            });
        } else {
            document.getElementById('start-leaderboard').innerText = "未設定後端 GAS 網址";
        }
    };

    function renderLeaderboard(targetId, list) {
        const target = document.getElementById(targetId);
        if(!list || list.length === 0) { target.innerHTML = "📭 尚無人留名，快來搶佔第一！"; return; }
        let html = '';
        list.forEach((item, index) => {
            html += `<div class="leaderboard-item rank-${index+1}">
                        <span>第 ${index+1} 名: ${item.name}</span>
                        <span>${item.score} 分</span>
                     </div>`;
        });
        target.innerHTML = html;
    }

    // 觸控/滑鼠拖曳邏輯保持不變
    let isDragging = false;
    function handleMove(clientX) {
        if (!gameActive) return;
        const rect = container.getBoundingClientRect();
        let x = ((clientX - rect.left) / rect.width) * 100;
        if (x < 5) x = 5; if (x > 95) x = 95;
        playerX = x; player.style.left = `${playerX}%`;
    }
    container.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    container.addEventListener('mousemove', (e) => { if(isDragging) handleMove(e.clientX); });
    container.addEventListener('touchstart', (e) => { isDragging = true; handleMove(e.touches[0].clientX); });
    container.addEventListener('touchend', () => isDragging = false);
    container.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX); }, {passive: true});

    function startGame() {
        score = 0; hp = 3; timeLeft = 60; playerX = 50; player.style.left = '50%';
        gameObjects.forEach(obj => obj.element.remove()); gameObjects = [];
        uiScore.innerText = `📦 物資: ${score}`; uiTimer.innerText = `⏱️ 倒數: ${timeLeft}s`; uiHp.innerText = '❤️ ❤️ ❤️';
        startScreen.classList.add('hidden'); gameoverScreen.classList.add('hidden');
        document.getElementById('upload-section').classList.remove('hidden');
        gameActive = true;
        timerId = setInterval(updateTimer, 1000);
        spawnId = setInterval(spawnObject, 700); // 略微放慢生成頻率
        gameLoopId = requestAnimationFrame(updateGame);
    }

    function updateTimer() {
        timeLeft--; uiTimer.innerText = `⏱️ 倒數: ${timeLeft}s`;
        if (timeLeft <= 0) endGame(true);
    }

    function spawnObject() {
        if (!gameActive) return;
        const isHazard = Math.random() > 0.45;
        const emoji = isHazard ? hazards[Math.floor(Math.random() * hazards.length)] : items[Math.floor(Math.random() * items.length)];
        const el = document.createElement('div');
        el.className = 'game-object'; el.innerText = emoji;
        const leftPercent = Math.random() * 90 + 5;
        el.style.left = `${leftPercent}%`; el.style.top = '-50px';
        container.appendChild(el);

        // 【優化點】初始速度大幅降低（從 1.5 開始），隨著時間每過 1 秒才微幅增加
        const timePassed = 60 - timeLeft;
        const baseSpeed = 1.8 + (timePassed * 0.08); 
        const speed = baseSpeed + (Math.random() * 1.2);

        gameObjects.push({ element: el, x: leftPercent, y: -50, speed: speed, isHazard: isHazard });
    }

    function updateGame() {
        if (!gameActive) return;
        const containerHeight = container.clientHeight;
        const playerRect = player.getBoundingClientRect();

        for (let i = gameObjects.length - 1; i >= 0; i--) {
            let obj = gameObjects[i];
            obj.y += obj.speed;
            obj.element.style.top = `${obj.y}px`;

            // 後期陣風效果
            if (60 - timeLeft > 25) {
                obj.x += Math.sin(obj.y / 40) * 0.25;
                obj.element.style.left = `${obj.x}%`;
            }

            const objRect = obj.element.getBoundingClientRect();
            const isColliding = !(objRect.right < playerRect.left || objRect.left > playerRect.right || objRect.bottom < playerRect.top || objRect.top > playerRect.bottom);

            if (isColliding) {
                if (obj.isHazard) {
                    hp--; playSound('hit'); updateHpUI();
                    if (hp <= 0) endGame(false);
                } else {
                    score++; playSound('score');
                    uiScore.innerText = `📦 物資: ${score}`;
                }
                obj.element.remove(); gameObjects.splice(i, 1); continue;
            }
            if (obj.y > containerHeight) { obj.element.remove(); gameObjects.splice(i, 1); }
        }
        gameLoopId = requestAnimationFrame(updateGame);
    }

    function updateHpUI() {
        let hpStr = ''; for(let i=0; i<3; i++) hpStr += i < hp ? '❤️ ' : '🖤 ';
        uiHp.innerText = hpStr;
    }

    function endGame(isWin) {
        gameActive = false; clearInterval(timerId); clearInterval(spawnId); cancelAnimationFrame(gameLoopId);
        endTitle.innerText = isWin ? '🎉 成功挺過颱風！' : '😭 阿伯被砸暈了！';
        endScore.innerText = `最終獲得防颱物資：${score} 個`;
        gameoverScreen.classList.remove('hidden');
        document.getElementById('end-leaderboard').innerText = "輸入暱稱上傳後，查看最新前三名！";
    }

    // 上傳分數到 GAS
    function submitScore() {
        const nameInput = document.getElementById('player-name').value.trim();
        const username = nameInput || "匿名阿伯";
        const submitBtn = document.getElementById('submit-btn');
        
        if(GAS_URL === "YOUR_GAS_WEB_APP_URL") { alert("前端未配置您的 GAS 網址！"); return; }
        
        submitBtn.innerText = "上傳中...";
        submitBtn.disabled = true;

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // 跨域模式
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: username, score: score, ip: playerIP })
        })
        .then(() => {
            submitBtn.innerText = "上傳成功！";
            document.getElementById('upload-section').classList.add('hidden');
            // 由於 no-cors 無法直接獲取回傳內容，重新發起 GET 撈取最新的前三名更新顯示
            return fetch(GAS_URL);
        })
        .then(res => res ? res.json() : null)
        .then(data => {
            if(data) renderLeaderboard('end-leaderboard', data.topThree);
        })
        .catch(err => {
            document.getElementById('end-leaderboard').innerText = "上傳完畢 (請手動重新整理網頁查看最新排行)";
        });
    }

    function resetGame() {
        document.getElementById('player-name').value = '';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').innerText = "上傳紀錄";
        location.reload(); // 重新載入，同步刷新首頁排行榜與瀏覽量
    }
</script>
</body>
</html>
