<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jasmine 3D - 點陣虛擬人物</title>


<link rel="stylesheet" href="css/style.css">


<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161/build/three.min.js"></script>


</head>


<body>


<!-- 控制面板 -->

<div id="panel">


<h2>
🌸 Jasmine 3D
</h2>


<p>
點陣虛擬人物系統
</p>



<label class="upload">

上傳人物照片

<input 
type="file"
id="imageUpload"
accept="image/*"
>

</label>



<button id="createAvatar">

建立3D人物

</button>



<button id="speak">

語音測試

</button>



<div id="status">

等待圖片...

</div>

<img id="preview">

</div>



<!-- 3D顯示區 -->

<div id="viewer"></div>



<script src="js/app.js"></script>


</body>

</html>
