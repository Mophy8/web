<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 人臉點狀圖生成器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background-color: #4f46e5;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background-color: #4338ca;
        }

        #loading {
            display: none;
            margin-top: 10px;
            color: #a5b4fc;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
</head>
<body>

    <div id="controls">
        <h2>3D 面部點狀圖生成器</h2>
        <label class="upload-btn" for="image-upload">上傳人物照片</label>
        <input type="file" id="image-upload" accept="image/*">
        <div id="loading">正在辨識面部特徵，請稍候...</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, facePointsMesh;
        let detector;
        let isRotating = true;
        let baseGroup; // 用來包裹點雲，方便做旋轉動畫

        // 初始化 Three.js 場景
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            
            // 相機設定
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 200;

            // 渲染器設定
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 建立一個基礎群組來放置人臉點
            baseGroup = new THREE.Group();
            scene.add(baseGroup);

            // 燈光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            // 視窗大小縮放監聽
            window.addEventListener('resize', onWindowResize, false);
            
            animate();
        }

        // 初始化 MediaPipe 偵測器
        async function initDetector() {
            const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
            const detectorConfig = {
                runtime: 'tfjs',
                refineLandmarks: true // 包含眼睛、嘴唇細節
            };
            detector = await faceLandmarksDetection.createDetector(model, detectorConfig);
            console.log("Face Detector 已準備就緒");
        }

        // 處理圖片上傳與預測
        document.getElementById('image-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    // 開始偵測人臉
                    const faces = await detector.estimateFaces(img);
                    document.getElementById('loading').style.display = 'none';

                    if (faces.length > 0) {
                        create3DFace(faces[0].keypoints);
                    } else {
                        alert("未能偵測到清晰的人臉，請換一張試試！");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 根據偵測到的關鍵點建立 3D 實心點狀圖
        function create3DFace(keypoints) {
            // 如果之前已經有臉部點，先移除
            if (facePointsMesh) {
                baseGroup.remove(facePointsMesh);
            }

            // 計算中心點（用來將人臉移到 3D 世界的中央）
            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;
            let minZ = Infinity, maxZ = -Infinity;

            keypoints.forEach(pt => {
                if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
                if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
                if (pt.z < minZ) minZ = pt.z; if (pt.z > maxZ) maxZ = pt.z;
            });

            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            const centerZ = (minZ + maxZ) / 2;
            
            // 縮放比例，讓不同大小的圖片在畫面上看起來差不多大
            const scale = 120 / (maxX - minX); 

            // 建立點的幾何體
            const geometry = new THREE.BufferGeometry();
            const positions = [];

            keypoints.forEach(pt => {
                // 轉換座標系：MediaPipe 的 Y 軸向下，Three.js 的 Y 軸向上，所以 Y 要加負號
                const x = (pt.x - centerX) * scale;
                const y = -(pt.y - centerY) * scale;
                const z = -(pt.z - centerZ) * scale; // 深度調整
                
                positions.push(x, y, z);
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            // 建立「實心點」材質
            // 使用內建的圓形點貼圖，或是調整 sizeAttenuation 讓它看起來像立體實心球
            const material = new THREE.PointsMaterial({
                color: 0x6366f1,       // 靛藍色，科技感
                size: 2.5,             // 點的大小
                sizeAttenuation: true, // 隨相機距離遠近改變大小
                transparent: true,
                opacity: 0.9
            });

            // 建立點雲網格
            facePointsMesh = new THREE.Points(geometry, material);
            baseGroup.add(facePointsMesh);
            
            // 重設旋轉角度
            baseGroup.rotation.y = 0;
        }

        // 動態循環效果（左右輕微擺動）
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            if (facePointsMesh) {
                time += 0.015;
                // 使用正弦函數 (Math.sin) 讓物體在 -0.25 到 0.25 弧度之間左右來回擺動
                baseGroup.rotation.y = Math.sin(time) * 0.25;
            }

            renderer.render(scene, camera);
        }

        // 處理視窗大小改變
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 啟動流程
        (async function main() {
            initThree();
            await initDetector();
        })();
    </script>
</body>
</html>
