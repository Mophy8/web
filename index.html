<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲功能目錄</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        h1 { color: #333; }
        .menu-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .menu-btn { display: block; width: 250px; padding: 15px; font-size: 18px; color: white; background-color: #007bff; text-decoration: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.2s; }
        .menu-btn:hover { background-color: #0056b3; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>🎮 歡迎來到遊戲大廳</h1>
    <p>請選擇你想遊玩的網頁遊戲：</p>

    <div id="menu" class="menu-container">
        <p class="loading">正在載入遊戲選單...</p>
    </div>

    <script>
        // ⚠️ 請把下方網址替換成你剛剛在 GAS 複製的網頁應用程式網址
        const gasUrl = "https://script.google.com/macros/s/XXXXXX/exec";

        // 向 GAS 請求資料
        fetch(gasUrl)
            .then(response => response.json())
            .then(data => {
                const menuContainer = document.getElementById('menu');
                menuContainer.innerHTML = ''; // 清空「正在載入...」的文字

                // 根據試算表資料，自動產生 HTML 按鈕
                data.forEach(item => {
                    const btn = document.createElement('a');
                    btn.href = item.url;
                    btn.className = 'menu-btn';
                    btn.textContent = item.name;
                    menuContainer.appendChild(btn);
                });
            })
            .catch(error => {
                console.error('預載入選單失敗:', error);
                document.getElementById('menu').innerHTML = '<p style="color:red;">選單載入失敗，請稍後再試</p>';
            });
    </script>
</body>
</html>
