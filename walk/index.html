<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力健走王</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #game-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #2e7d32; font-size: 28px; }
        .score-board { font-size: 24px; margin: 20px 0; font-weight: bold; }
        
        /* 角色走路進度條 */
        #track {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        #avatar {
            width: 10%;
            height: 100%;
            background-color: #4caf50;
            transition: width 0.2s ease;
            text-align: right;
            line-height: 30px;
            color: white;
            font-size: 14px;
        }

        /* 超大按鈕適合手指點擊 */
        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }
        .foot-btn {
            width: 120px;
            height: 120px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #2196f3;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px #1976d2;
        }
        .foot-btn:active {
            box-shadow: 0 2px #1976d2;
            transform: translateY(4px);
        }
        .foot-btn:disabled {
            background-color: #bdbdbd;
            box-shadow: 0 6px #9e9e9e;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🚶‍♂️ 活力健走王 🚶‍♀️</h1>
    <p style="font-size: 18px; color: #666;">請交替點擊「左腳」與「右腳」前進！</p>
    
    <div class="score-board">目前步數：<span id="steps">0</span> 步</div>
    
    <div id="track">
        <div id="avatar">🏃‍♂️</div>
    </div>

    <div class="btn-container">
        <button id="left-btn" class="foot-btn" onclick="takeStep('left')">左腳</button>
        <button id="right-btn" class="foot-btn" onclick="takeStep('right')" disabled>右腳</button>
    </div>
</div>

<script>
    let steps = 0;
    const targetSteps = 50; // 走50步通關
    let nextFoot = 'left';

    const stepsDisplay = document.getElementById('steps');
    const avatar = document.getElementById('avatar');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    function takeStep(foot) {
        if (foot === nextFoot) {
            steps++;
            stepsDisplay.innerText = steps;

            // 更新進度條
            let progress = (steps / targetSteps) * 100;
            avatar.style.width = Math.min(progress, 100) + '%';

            // 切換左右腳狀態
            if (foot === 'left') {
                nextFoot = 'right';
                leftBtn.disabled = true;
                rightBtn.disabled = false;
            } else {
                nextFoot = 'left';
                leftBtn.disabled = false;
                rightBtn.disabled = true;
            }

            // 檢查是否通關
            if (steps >= targetSteps) {
                setTimeout(() => {
                    alert('🎉 恭喜完成今日健走！身體棒棒、活力滿滿！');
                    resetGame();
                }, 300);
            }
        }
    </script>
</body>
</html>
