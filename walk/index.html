<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力健走王 - 關卡挑戰版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; color: #2c3e50;
        }

        #game-container {
            text-align: center; background: rgba(255, 255, 255, 0.95);
            padding: 25px 20px; border-radius: 32px;
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.2);
            width: 92%; max-width: 440px; border: 4px solid #a5d6a7;
        }

        h1 { color: #1b5e20; font-size: 32px; margin: 0 0 5px 0; }
        
        /* 關卡選擇區樣式 */
        .level-selector {
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px;
        }
        .level-btn {
            flex: 1; padding: 8px 5px; font-size: 14px; font-weight: bold;
            border: 2px solid #a5d6a7; background-color: #f1f8e9; border-radius: 12px;
            cursor: pointer; transition: all 0.2s; color: #2e7d32;
        }
        .level-btn.active {
            background-color: #2e7d32; color: white; border-color: #1b5e20;
            box-shadow: 0 4px 8px rgba(46,125,50,0.3);
        }
        .level-desc {
            font-size: 16px; color: #e65100; font-weight: bold; margin-bottom: 15px;
        }
        
        /* 看板 */
        .info-panel { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .info-card { flex: 1; background-color: #f1f8e9; padding: 10px; border-radius: 16px; border: 2px solid #c8e6c9; }
        .info-label { font-size: 13px; color: #666; margin-bottom: 2px; }
        .info-val { font-size: 22px; font-weight: bold; }
        .text-green { color: #2e7d32; }
        .text-red { color: #c62828; }
        
        /* 跑道 */
        #track {
            width: 100%; height: 50px; background-color: #f5f5f5; border-radius: 25px;
            position: relative; margin: 20px 0; border: 3px solid #e0e0e0;
            background-image: linear-gradient(90deg, transparent 95%, #e0e0e0 95%); background-size: 10% 100%;
        }
        #avatar-container { position: absolute; left: 0%; top: -15px; width: 60px; height: 60px; transition: left 0.1s linear; }

        /* 按鈕 */
        .btn-container { display: flex; justify-content: space-around; gap: 20px; margin-top: 15px; }
        .foot-btn {
            flex: 1; height: 130px; font-size: 26px; font-weight: bold; color: white;
            border: none; border-radius: 24px; cursor: pointer; transition: all 0.05s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        #left-btn { background: linear-gradient(145deg, #4fc3f7, #0288d1); box-shadow: 0 10px #01579b; }
        #left-btn:active { box-shadow: 0 2px #01579b; transform: translateY(8px); }
        #right-btn { background: linear-gradient(145deg, #ffb74d, #f57c00); box-shadow: 0 10px #b75100; }
        #right-btn:active { box-shadow: 0 2px #b75100; transform: translateY(8px); }
        .foot-btn:disabled { background: #e2e8f0 !important; box-shadow: 0 10px #cbd5e1 !important; color: #94a3b8; cursor: not-allowed; transform: none !important; opacity: 0.6; }
        .foot-icon { font-size: 32px; }

        /* 排行榜 */
        .leaderboard { margin-top: 20px; text-align: left; background: #fffdf7; padding: 12px; border-radius: 20px; border: 2px dashed #ffb74d; }
        .leaderboard h3 { margin: 0 0 8px 0; color: #e65100; font-size: 16px; text-align: center; }
        .leaderboard ul { list-style: none; padding: 0; margin: 0; font-size: 14px; }
        .leaderboard li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #ffe0b2; font-weight: bold; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background-color: white; padding: 25px; border-radius: 28px; width: 85%; max-width: 360px; text-align: center; border: 4px solid #81c784; }
        .modal-btn { background: linear-gradient(145deg, #66bb6a, #388e3c); color: white; border: none; padding: 12px 35px; font-size: 18px; border-radius: 16px; cursor: pointer; margin-top: 15px; font-weight: bold; box-shadow: 0 5px #1b5e20; }
        .name-input { width: 90%; padding: 10px; font-size: 16px; margin: 12px 0; border: 2px solid #81c784; border-radius: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🚶‍♂️ 活力健走王</h1>
    
    <p style="margin: 8px 0 4px 0; font-size: 14px; font-weight: bold; color: #555;">選擇健走景點：</p>
    <div class="level-selector">
        <button id="lv1-btn" class="level-btn active" onclick="selectLevel(1)">1.社區公園</button>
        <button id="lv2-btn" class="level-btn" onclick="selectLevel(2)">2.柴山步道</button>
        <button id="lv3-btn" class="level-btn" onclick="selectLevel(3)">3.阿里山日出</button>
    </div>
    <div id="level-desc" class="level-desc">目標：輕鬆散步 40 步 (限時 30 秒)</div>
    
    <div class="info-panel">
        <div class="info-card">
            <div class="info-label">🎯 當前步數</div>
            <div id="steps" class="info-val text-green">0 / 40</div>
        </div>
        <div class="info-card">
            <div class="info-label">⏰ 剩餘時間</div>
            <div id="timer" class="info-val text-red">30 秒</div>
        </div>
    </div>
    
    <div id="track">
        <div id="avatar-container">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
                <circle cx="30" cy="38" r="14" fill="#4caf50"/>
                <path d="M22 30 Q30 36 38 30" stroke="#fff" stroke-width="2" fill="none"/>
                <circle cx="30" cy="20" r="10" fill="#ffcc80"/>
                <path d="M18 16 Q30 10 42 16" stroke="#e65100" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M16 16 L44 16 Q48 20 44 20 L16 20 Z" fill="#ff9800"/>
                <circle cx="26" cy="19" r="1.5" fill="#333"/><circle cx="34" cy="19" r="1.5" fill="#333"/>
                <path d="M25 24 Q30 28 35 24" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div class="btn-container">
        <button id="left-btn" class="foot-btn" onclick="takeStep('left')">
            <span class="foot-icon">👣</span><span>左 腳</span>
        </button>
        <button id="right-btn" class="foot-btn" onclick="takeStep('right')" disabled>
            <span class="foot-icon">👣</span><span>右 腳</span>
        </button>
    </div>

    <div class="leaderboard">
        <h3 id="board-title">🏆 社區公園英雄榜 (前三名)</h3>
        <ul id="leaderboard-list">
            <li><span style="color:#999; font-weight:normal;">暫無紀錄，等您來挑戰！</span></li>
        </ul>
    </div>
</div>

<div id="health-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">🎉 成功達標！</h2>
        <p id="health-tip"></p>
        <div id="name-input-section">
            <label for="username" style="font-weight:bold; color:#1b5e20;">留下您的大名（上傳雲端）：</label>
            <input type="text" id="username" class="name-input" placeholder="例如：美鳳姐" maxlength="10">
        </div>
        <button id="action-btn" class="modal-btn" onclick="submitScore()">儲存並再走一回</button>
    </div>
</div>

<script>
    // 🔴 請更換為您的 GAS Web App 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQy3DDpHM6Ps3tW33S1P89bt6SXKstcidPFk9byuomnS7uHCZZcvUtva_xTGClocE/exec";
    
    // 儲存目前玩家真實 IP
    let userIP = "正在取得IP...";

    // 關卡設定庫
    const levels = {
        1: { name: "清晨的社區公園", target: 40, time: 30, desc: "目標：輕鬆散步 40 步 (限時 30 秒)" },
        2: { name: "高雄柴山步道", target: 50, time: 25, desc: "目標：有些坡度！50 步 (限時 25 秒)" },
        3: { name: "阿里山看日出", target: 60, time: 20, desc: "目標：終極登頂！60 步 (限時 20 秒)" }
    };
    
    let currentLevel = 1;
    let steps = 0;
    let timeLeft = 30;     
    let nextFoot = 'left';
    let timerInterval = null;
    let gameActive = true;
    let startTime = 0;
    let timeUsed = 0;

    // 非同步取得真實 IP
    function fetchUserIP() {
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => { userIP = data.ip; console.log("取得真實IP:", userIP); })
            .catch(err => { userIP = "無法取得(可能阻擋)"; console.error(err); });
    }
    window.onload = function() {
        fetchUserIP();
        updateLeaderboardView();
    };

    // 音效系統
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

    function playStepSound(isLeft) {
        initAudio();
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'triangle';
        let baseFreq = isLeft ? 110 : 165;
        osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
        if (audioCtx.createStereoPanner) {
            let panner = audioCtx.createStereoPanner();
            panner.pan.setValueAtTime(isLeft ? -0.6 : 0.6, audioCtx.currentTime);
            osc.connect(panner); panner.connect(gain);
        } else { osc.connect(gain); }
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        initAudio(); const now = audioCtx.currentTime; const freqs = [261.6, 329.6, 392.0, 523.3];
        freqs.forEach((f, i) => {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = f;
            gain.gain.setValueAtTime(0.3, now + i * 0.08); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.3);
        });
    }

    function playLoseSound() {
        initAudio(); let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    // 切換關卡
    function selectLevel(lv) {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        currentLevel = lv;
        
        // 切換按鈕亮燈
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`lv${lv}-btn`).classList.add('active');
        
        // 更新關卡文字資訊
        document.getElementById('level-desc').innerText = levels[lv].desc;
        document.getElementById('board-title').innerText = `🏆 ${levels[lv].name}英雄榜 (前三名)`;
        
        // 重設遊戲狀態
        resetGameParameters();
        updateLeaderboardView();
    }

    function resetGameParameters() {
        steps = 0;
        timeLeft = levels[currentLevel].time;
        nextFoot = 'left';
        gameActive = true;
        document.getElementById('steps').innerText = `0 / ${levels[currentLevel].target}`;
        document.getElementById('timer').innerText = timeLeft + " 秒";
        document.getElementById('avatar-container').style.left = '0%';
        document.getElementById('left-btn').disabled = false;
        document.getElementById('right-btn').disabled = true;
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + " 秒";
            if (timeLeft <= 0) { clearInterval(timerInterval); gameOver(false); }
        }, 1000);
    }

    function takeStep(foot) {
        if (!gameActive) return;
        if (steps === 0 && !timerInterval) startTimer();

        if (foot === nextFoot) {
            steps++;
            let target = levels[currentLevel].target;
            document.getElementById('steps').innerText = `${steps} / ${target}`;
            playStepSound(foot === 'left');

            let progress = (steps / target) * 85;
            document.getElementById('avatar-container').style.left = progress + '%';

            if (foot === 'left') {
                nextFoot = 'right'; document.getElementById('left-btn').disabled = true; document.getElementById('right-btn').disabled = false;
            } else {
                nextFoot = 'left'; document.getElementById('left-btn').disabled = false; document.getElementById('right-btn').disabled = true;
            }

            if (steps >= target) {
                clearInterval(timerInterval);
                timeUsed = ((Date.now() - startTime) / 1000).toFixed(2);
                gameOver(true);
            }
        }
    }

    function gameOver(isWin) {
        gameActive = false;
        document.getElementById('left-btn').disabled = true;
        document.getElementById('right-btn').disabled = true;

        if (isWin) {
            playWinSound();
            document.getElementById('modal-title').innerText = `🎉 成功征服【${levels[currentLevel].name}】！`;
            document.getElementById('health-tip').innerText = `花費時間：${timeUsed} 秒。多運動能增強心肺功能，您太棒了！`;
            document.getElementById('name-input-section').style.display = 'block';
            document.getElementById('action-btn').innerText = "上傳紀錄並繼續";
        } else {
            playLoseSound();
            document.getElementById('modal-title').innerText = "⏰ 哎呀，體力不支！";
            document.getElementById('health-tip').innerText = "別氣餒，喝口水休息一下，隨時可以再試一次！";
            document.getElementById('name-input-section').style.display = 'none';
            document.getElementById('action-btn').innerText = "再挑戰一次";
        }
        document.getElementById('health-modal').style.display = 'flex';
    }

    function updateLeaderboardView() {
        const listEl = document.getElementById('leaderboard-list');
        let records = JSON.parse(localStorage.getItem(`walk_records_lv${currentLevel}`)) || [];
        records.sort((a, b) => a.time - b.time);
        records = records.slice(0, 3); // 前三名

        if (records.length === 0) {
            listEl.innerHTML = `<li><span style="color:#999; font-weight:normal;">暫無紀錄，等您來挑戰！</span></li>`;
            return;
        }
        listEl.innerHTML = records.map((r, i) => `
            <li><span>${i==0?'🥇':i==1?'🥈':'🥉'} ${r.name}</span><span class="text-green">${r.time} 秒</span></li>
        `).join('');
    }

    function submitScore() {
        let target = levels[currentLevel].target;
        if (steps >= target) {
            let name = document.getElementById('username').value.trim() || "活力大師";
            
            // 1. 本地儲存 (分關卡儲存)
            let records = JSON.parse(localStorage.getItem(`walk_records_lv${currentLevel}`)) || [];
            records.push({ name: name, time: parseFloat(timeUsed) });
            localStorage.setItem(`walk_records_lv${currentLevel}`, JSON.stringify(records));
            updateLeaderboardView();

            // 2. 發送至 GAS 雲端 (包含修正後的真實 IP 欄位)
            if (GAS_URL && !GAS_URL.includes("XXXXX")) {
                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        level: levels[currentLevel].name,
                        name: name, 
                        timeUsed: timeUsed, 
                        steps: steps,
                        clientIP: userIP  // <-- 修正關鍵：從前端直接把抓到的 IP 傳過去
                    })
                }).catch(e => console.log("GAS 發送失敗"));
            }
        }
        document.getElementById('health-modal').style.display = 'none';
        document.getElementById('username').value = '';
        resetGameParameters();
    }
</script>
</body>
</html>
