<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力健走王 - 音效挑戰版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #game-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 420px;
        }
        h1 { color: #2e7d32; font-size: 32px; margin-bottom: 5px; }
        .sub-title { font-size: 18px; color: #555; margin-bottom: 20px; }
        
        .info-panel {
            display: flex;
            justify-content: space-between;
            background-color: #f1f8e9;
            padding: 15px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .text-green { color: #388e3c; }
        .text-red { color: #d32f2f; }
        
        #track {
            width: 100%;
            height: 35px;
            background-color: #eee;
            border-radius: 20px;
            overflow: hidden;
            margin: 25px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        #avatar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #81c784, #4caf50);
            transition: width 0.05s ease;
            text-align: right;
            line-height: 35px;
            font-size: 22px;
            padding-right: 5px;
            box-sizing: border-box;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
        }
        .foot-btn {
            width: 130px;
            height: 130px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #3498db, #2980b9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px #1f6391, 0 10px 15px rgba(0,0,0,0.1);
            transition: transform 0.05s;
        }
        .foot-btn:active {
            box-shadow: 0 2px #1f6391;
            transform: translateY(6px);
        }
        .foot-btn:disabled {
            background: #cbd5e1;
            box-shadow: 0 8px #94a3b8;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h2 { color: #2e7d32; margin-top: 0; }
        .modal-content p { font-size: 18px; line-height: 1.6; color: #444; }
        .modal-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🚶‍♂️ 活力健走王</h1>
    <div class="sub-title">雙腳交替點，健康多一點！</div>
    
    <div class="info-panel">
        <div>步數：<span id="steps" class="text-green">0</span> / 60</div>
        <div>倒數：<span id="timer" class="text-red">20</span> 秒</div>
    </div>
    
    <div id="track">
        <div id="avatar">🏃‍♂️</div>
    </div>

    <div class="btn-container">
        <button id="left-btn" class="foot-btn" onclick="takeStep('left')">左腳</button>
        <button id="right-btn" class="foot-btn" onclick="takeStep('right')" disabled>右腳</button>
    </div>
</div>

<div id="health-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">🎉 成功達標！</h2>
        <p id="health-tip">這裡會顯示健康小常識</p>
        <button class="modal-btn" onclick="closeModal()">再挑戰一次</button>
    </div>
</div>

<script>
    let steps = 0;
    const targetSteps = 60; // 提高到 60 步
    let timeLeft = 20;     // 縮短到 20 秒
    let nextFoot = 'left';
    let timerInterval = null;
    let gameActive = true;

    // 初始化 Web Audio API 音效系統
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioCtx();
        }
    }

    // 播放腳步聲（低沉穩重的木頭踏步聲）
    function playStepSound() {
        initAudio();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(120, audioCtx.currentTime); // 低音
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    // 播放成功音效（輕快的和弦）
    function playWinSound() {
        initAudio();
        const now = audioCtx.currentTime;
        const freqs = [261.6, 329.6, 392.0, 523.3]; // Do, Mi, Sol, Do
        freqs.forEach((f, i) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = f;
            gain.gain.setValueAtTime(0.3, now + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.1);
            osc.stop(now + i * 0.1 + 0.4);
        });
    }

    // 播放失敗音效（下沉的嗶聲）
    function playLoseSound() {
        initAudio();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    const healthTips = [
        "飯後散步30分鐘，有助於促進消化、穩定血糖喔！",
        "健走時記得挺胸縮腹，擺動雙臂，運動效果會加倍！",
        "多喝水能促進新陳代謝，今天你喝足2000毫升的水了嗎？",
        "每週健走150分鐘，能有效增強心肺功能，維持血管健康！",
        "出門健走記得穿著包覆性好的運動鞋，保護膝蓋與腳踝。"
    ];

    const stepsDisplay = document.getElementById('steps');
    const timerDisplay = document.getElementById('timer');
    const avatar = document.getElementById('avatar');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const modal = document.getElementById('health-modal');
    const healthTip = document.getElementById('health-tip');
    const modalTitle = document.getElementById('modal-title');

    function startTimer() {
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver(false);
            }
        }, 1000);
    }

    function takeStep(foot) {
        if (!gameActive) return;

        if (steps === 0 && !timerInterval) {
            startTimer();
        }

        if (foot === nextFoot) {
            steps++;
            stepsDisplay.innerText = steps;
            
            // 播放腳步聲
            playStepSound();

            let progress = (steps / targetSteps) * 100;
            avatar.style.width = Math.min(progress, 100) + '%';

            if (foot === 'left') {
                nextFoot = 'right';
                leftBtn.disabled = true;
                rightBtn.disabled = false;
            } else {
                nextFoot = 'left';
                leftBtn.disabled = false;
                rightBtn.disabled = true;
            }

            if (steps >= targetSteps) {
                clearInterval(timerInterval);
                gameOver(true);
            }
        }
    }

    function gameOver(isWin) {
        gameActive = false;
        leftBtn.disabled = true;
        rightBtn.disabled = true;

        if (isWin) {
            playWinSound();
            modalTitle.innerText = "🎉 成功達標！體能真棒！";
            const randomTip = healthTips[Math.floor(Math.random() * healthTips.length)];
            healthTip.innerText = randomTip;
        } else {
            playLoseSound();
            modalTitle.innerText = "⏰ 哎呀，時間到了！";
            healthTip.innerText = "沒關係，留得青山在，不怕沒柴燒。深呼吸一下，我們再試一次！";
        }
        
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
        steps = 0;
        timeLeft = 20;
        nextFoot = 'left';
        timerInterval = null;
        gameActive = true;

        stepsDisplay.innerText = steps;
        timerDisplay.innerText = timeLeft;
        avatar.style.width = '0%';
        
        leftBtn.disabled = false;
        rightBtn.disabled = true;
    }
</script>
</body>
</html>
